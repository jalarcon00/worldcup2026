function parseUTC(dateStr, timeStr="12:00 UTC-5") {
  try {
    const [hhmm, utcPart] = timeStr.split(" ");
    const [h,m] = hhmm.split(":").map(Number);
    const offset = parseInt(utcPart.replace("UTC",""),10);
    const d = new Date(`${dateStr}T${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:00`);
    d.setHours(d.getHours()-offset);
    return d;
  } catch { return new Date(dateStr); }
}
const fmtDate = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtTime = d => d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
function mStatus(m,now) {
  if (m.score) return "done";
  const dt = parseUTC(m.date,m.time);
  const mins=(now-dt)/60000;
  if (mins>=0&&mins<110) return "live";
  return dt>now ? "upcoming" : "done";
}

function buildStandings() {
  const g={};
  RAW_MATCHES.filter(m=>m.group).forEach(m=>{
    if(!g[m.group])g[m.group]={};
    [m.team1,m.team2].forEach(t=>{if(!g[m.group][t])g[m.group][t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    if(m.score){
      const[s1,s2]=m.score.ft;
      g[m.group][m.team1].p++;g[m.group][m.team2].p++;
      g[m.group][m.team1].gf+=s1;g[m.group][m.team1].ga+=s2;
      g[m.group][m.team2].gf+=s2;g[m.group][m.team2].ga+=s1;
      if(s1>s2){g[m.group][m.team1].w++;g[m.group][m.team1].pts+=3;g[m.group][m.team2].l++;}
      else if(s2>s1){g[m.group][m.team2].w++;g[m.group][m.team2].pts+=3;g[m.group][m.team1].l++;}
      else{g[m.group][m.team1].d++;g[m.group][m.team2].d++;g[m.group][m.team1].pts++;g[m.group][m.team2].pts++;}
    }
  });
  return Object.entries(g).map(([grp,teams])=>({
    group:grp,
    standings:Object.values(teams).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf),
  })).sort((a,b)=>a.group.localeCompare(b.group));
}
const STANDINGS=buildStandings();

function Btn({active,onClick,children,style={}}) {
  return <button onClick={onClick} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${active?C.gold:C.border}`,background:active?`${C.gold}22`:"transparent",color:active?C.gold:C.muted,fontSize:12,fontWeight:600,cursor:"pointer",...style}}>{children}</button>;
}

function MatchCard({m,now}) {
  const st=mStatus(m,now);
  const isCol=m.team1==="Colombia"||m.team2==="Colombia";
  const isLive=st==="live";
  const dt=parseUTC(m.date,m.time);
  return (
    <div style={{background:isCol&&!isLive?"#1a1800":isLive?"#1a1218":C.card,border:`1px solid ${isLive?"#7f1d1d":isCol?C.col+"55":C.border}`,borderRadius:12,marginBottom:10,padding:"13px 15px"}}>
      {isCol&&<div style={{fontSize:10,color:C.col,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>🇨🇴 Colombia</div>}
      {isLive&&<div style={{display:"inline-flex",alignItems:"center",gap:5,background:"#7f1d1d",color:"#fca5a5",fontSize:10,fontWeight:700,letterSpacing:"0.1em",padding:"2px 8px",borderRadius:20,marginBottom:8}}><div style={{width:6,height:6,borderRadius:"50%",background:C.red,animation:"pulse 1.5s infinite"}}/>LIVE</div>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:20}}>{fl(m.team1)}</span>
          <span style={{fontSize:13,fontWeight:600,color:C.white}}>{m.team1}</span>
        </div>
        {m.score?<div style={{background:"#0a0f1e",borderRadius:8,padding:"4px 12px",fontSize:17,fontWeight:800,color:C.white,minWidth:64,textAlign:"center"}}>{m.score.ft[0]} – {m.score.ft[1]}</div>:<div style={{background:C.border,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:C.muted,minWidth:36,textAlign:"center"}}>VS</div>}
        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
          <span style={{fontSize:13,fontWeight:600,color:C.white,textAlign:"right"}}>{m.team2}</span>
          <span style={{fontSize:20}}>{fl(m.team2)}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:9,fontSize:11,color:C.muted,flexWrap:"wrap"}}>
        {m.group&&<span style={{background:C.border,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700,color:C.goldL}}>{m.group}</span>}
        <span>📍 {m.ground}</span>
        <span>⏰ {fmtTime(dt)}</span>
      </div>
    </div>
  );
}

function ScheduleTab({now}) {
  const [filter,setFilter]=useState("upcoming");
  const grp=RAW_MATCHES.filter(m=>m.group);
  const ko=RAW_MATCHES.filter(m=>!m.group);
  const live=grp.filter(m=>mStatus(m,now)==="live");
  const upcoming=grp.filter(m=>mStatus(m,now)==="upcoming");
  const done=grp.filter(m=>mStatus(m,now)==="done");
  const byDate=arr=>{const map={};arr.forEach(m=>{const d=fmtDate(parseUTC(m.date,m.time));if(!map[d])map[d]=[];map[d].push(m);});return Object.entries(map);};
  return (
    <div style={{padding:"14px 14px 0"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,marginTop:6}}>
        {[{v:"live",l:"🔴 Live"},{v:"upcoming",l:"Next"},{v:"done",l:"Results"},{v:"ko",l:"🏆 Knockout"}].map(o=>(
          <Btn key={o.v} active={filter===o.v} onClick={()=>setFilter(o.v)}>{o.l}</Btn>
        ))}
      </div>
      {filter==="live"&&(live.length>0?live.map((m,i)=><MatchCard key={i} m={m} now={now}/>):<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"30px 0"}}>No matches live right now.</div>)}
      {filter==="upcoming"&&byDate(upcoming).map(([d,arr])=><div key={d}><div style={{fontSize:11,fontWeight:700,color:C.goldL,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:12,marginBottom:6}}>{d}</div>{arr.map((m,i)=><MatchCard key={i} m={m} now={now}/>)}</div>)}
      {filter==="done"&&byDate(done).reverse().map(([d,arr])=><div key={d}><div style={{fontSize:11,fontWeight:700,color:C.goldL,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:12,marginBottom:6}}>{d}</div>{arr.map((m,i)=><MatchCard key={i} m={m} now={now}/>)}</div>)}
      {filter==="ko"&&ko.map((m,i)=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10,padding:"13px 15px"}}>
          <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>{m.round}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
            <span style={{fontSize:13,fontWeight:600,color:C.white,flex:1}}>{fl(m.team1)} {m.team1}</span>
            {m.score?<div style={{background:"#0a0f1e",borderRadius:8,padding:"4px 12px",fontSize:15,fontWeight:800,color:C.white}}>{m.score.ft[0]}–{m.score.ft[1]}</div>:<div style={{background:C.border,borderRadius:8,padding:"3px 10px",fontSize:11,color:C.muted}}>VS</div>}
            <span style={{fontSize:13,fontWeight:600,color:C.white,flex:1,textAlign:"right"}}>{m.team2} {fl(m.team2)}</span>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:8}}>📅 {fmtDate(parseUTC(m.date,m.time))} · 📍 {m.ground}</div>
        </div>
      ))}
    </div>
  );
}

function StandingsTab() {
  const [active,setActive]=useState("Group K");
  const [page,setPage]=useState(Math.floor(STANDINGS.findIndex(g=>g.group==="Group K")/6));
  const PER=6,pages=Math.ceil(STANDINGS.length/PER);
  const visible=STANDINGS.slice(page*PER,page*PER+PER);
  const current=STANDINGS.find(g=>g.group===active);
  return (
    <div style={{padding:"14px 14px 0"}}>
      <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:6,marginBottom:4}}>
        {visible.map(g=>{const hasCol=g.standings.some(t=>t.team==="Colombia"),isAct=active===g.group;return(
          <button key={g.group} onClick={()=>setActive(g.group)} style={{flex:"none",minWidth:44,padding:"6px 0",background:isAct?C.gold:"transparent",border:`1px solid ${isAct?C.gold:hasCol?C.col:C.border}`,color:isAct?"#000":hasCol?C.col:C.muted,fontWeight:isAct?800:500,fontSize:12,cursor:"pointer",borderRadius:7,textAlign:"center"}}>{g.group.replace("Group ","")}</button>
        );})}
      </div>
      {pages>1&&<div style={{display:"flex",gap:8,marginBottom:10}}><button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{padding:"3px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:12,cursor:"pointer",opacity:page===0?0.3:1}}>◀</button><button onClick={()=>setPage(p=>Math.min(pages-1,p+1))} disabled={page===pages-1} style={{padding:"3px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:12,cursor:"pointer",opacity:page===pages-1?0.3:1}}>▶</button></div>}
      {current&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:10}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr><th style={{color:C.muted,fontWeight:600,fontSize:10,textTransform:"uppercase",padding:"8px 10px",textAlign:"left",borderBottom:`1px solid ${C.border}`,letterSpacing:"0.08em"}}>Team</th>{["P","W","D","L","GD","Pts"].map(h=><th key={h} style={{color:C.muted,fontWeight:600,fontSize:10,textTransform:"uppercase",padding:"8px 6px",textAlign:"center",borderBottom:`1px solid ${C.border}`,letterSpacing:"0.08em"}}>{h}</th>)}</tr></thead>
            <tbody>{current.standings.map((t,i)=>{const q=i<2,isCol=t.team==="Colombia",gd=t.gf-t.ga;return(
              <tr key={t.team} style={isCol?{background:"#1a1800"}:{}}>
                <td style={{padding:"9px 10px",borderBottom:`1px solid ${C.border}20`}}><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{width:3,height:16,borderRadius:2,background:q?C.green:"transparent",display:"inline-block",flexShrink:0}}/><span style={{fontSize:18}}>{fl(t.team)}</span><span style={{fontSize:13,fontWeight:isCol?800:600,color:isCol?C.col:q?C.white:C.muted}}>{t.team}</span></div></td>
                {[t.p,t.w,t.d,t.l,(gd>0?"+":"")+gd].map((v,j)=><td key={j} style={{padding:"9px 6px",textAlign:"center",color:q||isCol?C.white:C.muted,borderBottom:`1px solid ${C.border}20`,fontSize:12}}>{v}</td>)}
                <td style={{padding:"9px 6px",textAlign:"center",fontWeight:800,fontSize:13,color:t.pts>=4?C.green:t.pts>=2?C.goldL:C.muted,borderBottom:`1px solid ${C.border}20`}}>{t.pts}</td>
              </tr>
            );})}</tbody>
          </table>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:C.muted}}><span style={{width:3,height:14,background:C.green,borderRadius:2,display:"inline-block"}}/>Top 2 advance · Best 8 third-place teams also qualify</div>
    </div>
  );
}

function ForecastTab({now}) {
  const upcoming=RAW_MATCHES.filter(m=>m.group&&mStatus(m,now)==="upcoming").slice(0,5);
  const [preds,setPreds]=useState({});
  const [loading,setLoading]=useState({});

  const getPred=useCallback(async(m)=>{
    const key=`${m.team1}|${m.team2}`;
    if(preds[key]||loading[key])return;
    setLoading(l=>({...l,[key]:true}));
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`You are a 2026 World Cup analyst. Predict: ${m.team1} vs ${m.team2} (${m.group}, ${m.ground}). Respond ONLY valid JSON no markdown: {"homeWin":<0-100>,"draw":<0-100>,"awayWin":<0-100>,"score":"e.g. 2-1","analysis":"2-3 sentences","confidence":"High" or "Medium" or "Low"}`}]})});
      const data=await res.json();
      const text=data.content?.find(c=>c.type==="text")?.text||"{}";
      setPreds(p=>({...p,[key]:JSON.parse(text.replace(/```json|```/g,"").trim())}));
    }catch{setPreds(p=>({...p,[key]:{error:true}}));}
    finally{setLoading(l=>({...l,[key]:false}));}
  },[preds,loading]);

  useEffect(()=>{upcoming.forEach(getPred);},[upcoming.length]);

  const cColor=c=>c==="High"?C.green:c==="Medium"?"#fbbf24":"#818cf8";
  const cBg=c=>c==="High"?"#14532d":c==="Medium"?"#713f12":"#1e1b4b";

  return(
    <div style={{padding:"14px 14px 0"}}>
      <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>AI-powered match previews for upcoming matches.</div>
      {upcoming.map(m=>{
        const key=`${m.team1}|${m.team2}`;
        const p=preds[key];
        const isCol=m.team1==="Colombia"||m.team2==="Colombia";
        const dt=parseUTC(m.date,m.time);
        return(
          <div key={key} style={{background:isCol?"#1a1800":C.card,border:`1px solid ${isCol?C.col+"55":C.border}`,borderRadius:12,marginBottom:12,padding:"15px"}}>
            {isCol&&<div style={{fontSize:10,color:C.col,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>🇨🇴 Colombia</div>}
            <div style={{textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,color:C.white}}>{fl(m.team1)} {m.team1}  vs  {m.team2} {fl(m.team2)}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>{fmtDate(dt)} · {fmtTime(dt)} · {m.ground}</div>
            </div>
            {loading[key]&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"10px 0"}}>Generating prediction...</div>}
            {p&&!p.error&&(
              <>
                <div style={{display:"flex",borderRadius:5,overflow:"hidden",height:7,marginBottom:5,gap:2}}>
                  <div style={{flex:p.homeWin||0,background:C.blue,borderRadius:"4px 0 0 4px"}}/>
                  <div style={{flex:p.draw||0,background:C.muted}}/>
                  <div style={{flex:p.awayWin||0,background:C.red,borderRadius:"0 4px 4px 0"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:12}}>
                  <span style={{color:C.blue,fontWeight:700}}>{p.homeWin}% {m.team1}</span>
                  <span style={{color:C.muted}}>{p.draw}% Draw</span>
                  <span style={{color:C.red,fontWeight:700}}>{p.awayWin}% {m.team2}</span>
                </div>
                <div style={{background:"#0a0f1e",borderRadius:8,padding:"7px 12px",textAlign:"center",marginBottom:10}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Predicted Score</div>
                  <div style={{fontSize:16,fontWeight:800,color:C.goldL}}>{m.team1} {p.score} {m.team2}</div>
                </div>
                <p style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:8}}>{p.analysis}</p>
                <div style={{fontSize:11,color:C.muted}}>Confidence <span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:700,background:cBg(p.confidence),color:cColor(p.confidence),marginLeft:6}}>{p.confidence}</span></div>
              </>
            )}
            {p?.error&&<div style={{fontSize:12,color:C.muted,textAlign:"center"}}>Prediction not available.</div>}
          </div>
        );
      })}
      {upcoming.length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"30px 0"}}>No upcoming matches to predict.</div>}
    </div>
  );
}

function BracketTab({now}) {
  const ko=RAW_MATCHES.filter(m=>!m.group);
  const rounds=[...new Set(ko.map(m=>m.round))];
  const [active,setActive]=useState(rounds[0]);
  const current=ko.filter(m=>m.round===active);
  const lbl=r=>r.replace("Round of ","R").replace("Quarter-final","QF").replace("Semi-final","SF").replace("Match for third place","3rd");
  return(
    <div style={{padding:"14px 14px 0"}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14,marginTop:6}}>
        {rounds.map(r=><Btn key={r} active={active===r} onClick={()=>setActive(r)}>{lbl(r)}</Btn>)}
      </div>
      {current.map((m,i)=>{
        const isCol=m.team1==="Colombia"||m.team2==="Colombia";
        const dt=parseUTC(m.date,m.time);
        return(
          <div key={i} style={{background:isCol?"#1a1800":C.card,border:`1px solid ${isCol?C.col+"55":C.border}`,borderRadius:12,marginBottom:10,padding:"13px 15px"}}>
            {isCol&&<div style={{fontSize:10,color:C.col,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>🇨🇴 Colombia</div>}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <span style={{fontSize:13,fontWeight:600,color:C.white,flex:1}}>{fl(m.team1)} {m.team1}</span>
              {m.score?<div style={{background:"#0a0f1e",borderRadius:8,padding:"4px 12px",fontSize:16,fontWeight:800,color:C.white}}>{m.score.ft[0]}–{m.score.ft[1]}</div>:<div style={{background:C.border,borderRadius:8,padding:"3px 10px",fontSize:11,color:C.muted}}>VS</div>}
              <span style={{fontSize:13,fontWeight:600,color:C.white,flex:1,textAlign:"right"}}>{m.team2} {fl(m.team2)}</span>
            </div>
            <div style={{display:"flex",gap:12,marginTop:8,fontSize:11,color:C.muted}}>
              <span>📅 {fmtDate(dt)}</span><span>⏰ {fmtTime(dt)}</span><span>📍 {m.ground}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

const TABS=[{id:"schedule",label:"Schedule",icon:"📅"},{id:"standings",label:"Standings",icon:"📊"},{id:"forecast",label:"Forecast",icon:"🔮"},{id:"bracket",label:"Bracket",icon:"🏆"}];

function App() {
  const [tab,setTab]=useState("schedule");
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t);},[]);
  return(
    <div style={{background:C.bg,minHeight:"100vh",color:"#e5e7eb",maxWidth:430,margin:"0 auto",paddingBottom:80}}>
      <div style={{background:"linear-gradient(160deg,#0d1b3e 0%,#0a0f1e 60%)",padding:"20px 20px 14px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        <div style={{fontSize:10,letterSpacing:"0.18em",color:C.gold,textTransform:"uppercase",fontWeight:600,marginBottom:2}}>FIFA World Cup</div>
        <div style={{fontSize:21,fontWeight:800,color:C.white,letterSpacing:"-0.02em"}}>2026 · USA · MEX · CAN</div>
        <div style={{fontSize:11,color:C.muted,marginTop:3}}>🇨🇴 Group K · Colombia · Real data</div>
      </div>
      {tab==="schedule"&&<ScheduleTab now={now}/>}
      {tab==="standings"&&<StandingsTab/>}
      {tab==="forecast"&&<ForecastTab now={now}/>}
      {tab==="bracket"&&<BracketTab now={now}/>}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:20}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===t.id?C.gold:C.muted,fontSize:10,fontWeight:tab===t.id?700:400,letterSpacing:"0.05em",transition:"color 0.15s"}}>
            <span style={{fontSize:19,lineHeight:1}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
