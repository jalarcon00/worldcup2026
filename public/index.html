function parseUTC(dateStr, timeStr) {
  // Converts a match local time (e.g. "19:30 UTC-4") to a UTC Date object
  timeStr = timeStr || "12:00 UTC-5";
  try {
    var parts = timeStr.split(" ");
    var hhmm = parts[0], utcPart = parts[1];
    var hm = hhmm.split(":"); var hh = parseInt(hm[0]); var mm = parseInt(hm[1]);
    var offset = parseInt(utcPart.replace("UTC",""), 10); // e.g. -4 or -7
    // Build UTC timestamp directly: local time minus offset = UTC
    // e.g. 19:30 UTC-4 means UTC = 19:30 - (-4) = 23:30 UTC
    var utcHH = hh - offset; // subtract offset to get UTC hour
    // Handle day overflow
    var d = new Date(dateStr + "T00:00:00Z");
    d.setUTCHours(utcHH, mm, 0, 0);
    return d;
  } catch(e) { return new Date(dateStr + "T00:00:00Z"); }
}

function mStatus(m, now) {
  if (m.score) return "done";
  var dt = parseUTC(m.date, m.time);
  var mins = (now - dt) / 60000;
  if (mins >= 0 && mins < 110) return "live";
  return dt > now ? "upcoming" : "done";
}

function buildStandings() {
  var g = {};
  RAW_MATCHES.filter(function(m){return m.group;}).forEach(function(m) {
    if (!g[m.group]) g[m.group] = {};
    [m.team1, m.team2].forEach(function(t) { if (!g[m.group][t]) g[m.group][t] = {team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
    if (m.score) {
      var s1=m.score.ft[0], s2=m.score.ft[1];
      g[m.group][m.team1].p++; g[m.group][m.team2].p++;
      g[m.group][m.team1].gf+=s1; g[m.group][m.team1].ga+=s2;
      g[m.group][m.team2].gf+=s2; g[m.group][m.team2].ga+=s1;
      if(s1>s2){g[m.group][m.team1].w++;g[m.group][m.team1].pts+=3;g[m.group][m.team2].l++;}
      else if(s2>s1){g[m.group][m.team2].w++;g[m.group][m.team2].pts+=3;g[m.group][m.team1].l++;}
      else{g[m.group][m.team1].d++;g[m.group][m.team2].d++;g[m.group][m.team1].pts++;g[m.group][m.team2].pts++;}
    }
  });
  return Object.entries(g).map(function([grp,teams]){
    return {group:grp, standings:Object.values(teams).sort(function(a,b){return b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf;})};
  }).sort(function(a,b){return a.group.localeCompare(b.group);});
}
var STANDINGS = buildStandings();

// ── COMPONENTS ────────────────────────────────────────────────────────────────

    isCol && h("div",{style:{fontSize:10,color:C.col,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}},"\uD83C\uDDE8\uD83C\uDDF4 Colombia"),

      h("div",{style:{width:6,height:6,borderRadius:"50%",background:C.red,animation:"pulse 1.5s infinite"}}), "LIVE"),
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}},
      h("div",{style:{flex:1,display:"flex",alignItems:"center",gap:6}},
        h("span",{style:{fontSize:20}},fl(m.team1)),
        h("span",{style:{fontSize:13,fontWeight:600,color:C.white}},m.team1)
      ),
      m.score
        ? h("div",{style:{background:"#0a0f1e",borderRadius:8,padding:"4px 12px",fontSize:17,fontWeight:800,color:C.white,minWidth:64,textAlign:"center"}}, m.score.ft[0]+" \u2013 "+m.score.ft[1])
        : h("div",{style:{background:C.border,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:C.muted,minWidth:36,textAlign:"center"}},"VS"),
      h("div",{style:{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}},
        h("span",{style:{fontSize:13,fontWeight:600,color:C.white,textAlign:"right"}},m.team2),
        h("span",{style:{fontSize:20}},fl(m.team2))
      )
    ),
    h("div",{style:{display:"flex",gap:10,marginTop:9,fontSize:11,color:C.muted,flexWrap:"wrap"}},
      m.group && h("span",{style:{background:C.border,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700,color:C.goldL}},m.group),
      h("span",null,"\uD83D\uDCCD "+m.ground),
      h("span",null,"\u23F0 "+fmtTime(dt))
    )
  );
}

    filter==="done" && byDate(done).reverse().map(function(e){var d=e[0],arr=e[1];return h("div",{key:d},h("div",{style:{fontSize:11,fontWeight:700,color:C.goldL,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:12,marginBottom:6}},d),arr.map(function(m,i){return h(MatchCard,{key:i,m:m,now:now});}));}),

        h("span",{style:{fontSize:13,fontWeight:600,color:C.white,flex:1,textAlign:"right"}},m.team2+" "+fl(m.team2))
      ),
      h("div",{style:{fontSize:11,color:C.muted,marginTop:8}},"\uD83D\uDCC5 "+fmtDate(parseUTC(m.date,m.time))+" \u00B7 \uD83D\uDCCD "+m.ground)
    );})
  );
}

}

function BracketTab({now}) {
  var ko=RAW_MATCHES.filter(function(m){return !m.group;});
  var rounds=[...new Set(ko.map(function(m){return m.round;}))];
  var _a=useState(rounds[0]); var active=_a[0]; var setActive=_a[1];
  var current=ko.filter(function(m){return m.round===active;});

    h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14,marginTop:6}},
      rounds.map(function(r){return h("button",{key:r,onClick:function(){setActive(r);},style:{padding:"5px 12px",borderRadius:20,border:"1px solid "+(active===r?C.gold:C.border),background:active===r?C.gold+"22":"transparent",color:active===r?C.gold:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}},lbl(r));})
    ),

var TABS=[{id:"schedule",label:"Schedule",icon:"\uD83D\uDCC5"},{id:"standings",label:"Standings",icon:"\uD83D\uDCCA"},{id:"bracket",label:"Bracket",icon:"\uD83C\uDFC6"}];
