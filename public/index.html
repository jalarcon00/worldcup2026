function BracketTab({now, tx, todayData}) {
  var ko=RAW_MATCHES.filter(function(m){return !m.group;});
  var rounds=[...new Set(ko.map(function(m){return m.round;}))];
  var _a=useState(rounds[0]); var active=_a[0]; var setActive=_a[1];

  function getScore(m) {
    if (todayData) {
      var api = findLiveFixture(m, todayData);
      if (api && (api.status==="FT"||api.status==="AET"||api.status==="PEN")) {
        return api.home + "\u2013" + api.away;
      }
    }
    if (m.score) return m.score.ft[0]+"\u2013"+m.score.ft[1];
    return null;
  }

  // Resolve team name — if it starts with W or L, look up the match result
  function resolveTeam(code, matchMap) {
    if (!code || (!code.startsWith("W") && !code.startsWith("L"))) return code;
    var num = parseInt(code.slice(1));
    var ref = matchMap[num];
    if (!ref) return "Match " + num + " Winner";
    var score = getScore(ref);
    if (!score) return "W M" + num + " (" + ref.team1 + "/" + ref.team2 + ")";
    var parts = score.split("\u2013");
    var h = parseInt(parts[0]), a = parseInt(parts[1]);
    if (code.startsWith("W")) return h > a ? ref.team1 : h < a ? ref.team2 : ref.team1 + "/" + ref.team2;
    return h > a ? ref.team2 : h < a ? ref.team1 : ref.team1 + "/" + ref.team2;
  }

  var matchMap = {};
  ko.forEach(function(m){ if(m.match) matchMap[m.match] = m; });

  var current=ko.filter(function(m){return m.round===active;});
  function lbl(r){return r.replace("Round of ","R").replace("Quarter-final","QF").replace("Semi-final","SF").replace("Match for third place","3rd");}

  return h("div",{style:{padding:"14px 14px 0"}},
    h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14,marginTop:6}},
      rounds.map(function(r){return h("button",{key:r,onClick:function(){setActive(r);},style:{padding:"5px 12px",borderRadius:20,border:"1px solid "+(active===r?C.gold:C.border),background:active===r?C.gold+"22":"transparent",color:active===r?C.gold:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}},lbl(r));})
    ),
    current.map(function(m,i){
      var t1 = resolveTeam(m.team1, matchMap);
      var t2 = resolveTeam(m.team2, matchMap);
      var isCol = t1.indexOf("Colombia")!==-1 || t2.indexOf("Colombia")!==-1 || m.team1==="Colombia" || m.team2==="Colombia";
      var dt=parseUTC(m.date,m.time);
      var score = getScore(m);
      return h("div",{key:i,style:{background:isCol?"#1a1800":C.card,border:"1px solid "+(isCol?C.col+"55":C.border),borderRadius:12,marginBottom:10,padding:"13px 15px"}},
        // Match number badge
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
          m.match && h("span",{style:{background:C.border,borderRadius:4,padding:"1px 8px",fontSize:10,fontWeight:700,color:C.goldL,letterSpacing:"0.08em"}},"M"+m.match),
          isCol && h("span",{style:{fontSize:10,color:C.col,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}},tx.colombia)
        ),
        // Note label for future matches
        m.note && !score && h("div",{style:{fontSize:11,color:C.muted,marginBottom:8,fontStyle:"italic"}},m.note),
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}},
          h("span",{style:{fontSize:13,fontWeight:600,color:C.white,flex:1}},fl(t1)+" "+t1),
          score
            ? h("div",{style:{background:"#0a0f1e",borderRadius:8,padding:"4px 12px",fontSize:16,fontWeight:800,color:C.white}},score)
            : h("div",{style:{background:C.border,borderRadius:8,padding:"3px 10px",fontSize:11,color:C.muted}},tx.vs),
          h("span",{style:{fontSize:13,fontWeight:600,color:C.white,flex:1,textAlign:"right"}},t2+" "+fl(t2))
        ),
        h("div",{style:{display:"flex",gap:12,marginTop:8,fontSize:11,color:C.muted}},
          h("span",null,"\uD83D\uDCC5 "+fmtDate(dt)),
          h("span",null,"\u23F0 "+fmtTime(dt)),
          h("span",null,"\uD83D\uDCCD "+m.ground)
        )
      );
    })
  );
}

function ForecastTab({now, tx, liveData}) {
  var upcoming = RAW_MATCHES.filter(function(m){return m.group && mStatus(m,now,liveData)==="upcoming";}).slice(0,5);
  var _p=useState({}); var preds=_p[0]; var setPreds=_p[1];
  var _l=useState({}); var loading=_l[0]; var setLoading=_l[1];

  function getPred(m) {
    var key = m.team1+"|"+m.team2;
    if (preds[key]||loading[key]) return;
    setLoading(function(l){var n=Object.assign({},l);n[key]=true;return n;});
    fetch("/api/predict", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({team1:m.team1, team2:m.team2, group:m.group, ground:m.ground})
    }).then(function(r){return r.json();}).then(function(p){
      setPreds(function(pr){var n=Object.assign({},pr);n[key]=p.error?{error:true}:p;return n;});
    }).catch(function(){
      setPreds(function(pr){var n=Object.assign({},pr);n[key]={error:true};return n;});
    }).finally(function(){
      setLoading(function(l){var n=Object.assign({},l);n[key]=false;return n;});
    });
  }

  var cColor=function(c){return c==="High"?C.green:c==="Medium"?"#fbbf24":"#818cf8";};
  var cBg=function(c){return c==="High"?"#14532d":c==="Medium"?"#713f12":"#1e1b4b";};
  var btnLabel = tx.predictedScore==="Marcador Predicho" ? "Generar pronóstico" : "Generate Prediction";
  var introText = tx.predictedScore==="Marcador Predicho" ? "Pronósticos con IA para los próximos partidos." : "AI-powered match previews for upcoming matches.";
  var noUpcoming = tx.predictedScore==="Marcador Predicho" ? "No hay partidos próximos para predecir." : "No upcoming matches to predict.";
  return h("div",{style:{padding:"14px 14px 0"}},
    h("div",{style:{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}, introText),
    upcoming.length===0 && h("div",{style:{textAlign:"center",color:C.muted,fontSize:13,padding:"30px 0"}}, noUpcoming),
    upcoming.map(function(m){
      var key=m.team1+"|"+m.team2;
      var p=preds[key];
      var isCol=m.team1==="Colombia"||m.team2==="Colombia";
      var dt=parseUTC(m.date,m.time);
      return h("div",{key:key,style:{background:isCol?"#1a1800":C.card,border:"1px solid "+(isCol?C.col+"55":C.border),borderRadius:12,marginBottom:12,padding:"15px"}},
        isCol&&h("div",{style:{fontSize:10,color:C.col,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}},tx.colombia),
        h("div",{style:{textAlign:"center",marginBottom:12}},
          h("div",{style:{fontSize:14,fontWeight:700,color:C.white}},fl(m.team1)+" "+m.team1+"  vs  "+m.team2+" "+fl(m.team2)),
          h("div",{style:{fontSize:11,color:C.muted,marginTop:3}},fmtDate(dt)+" \u00B7 "+fmtTime(dt)+" \u00B7 "+m.ground)
        ),
        loading[key]&&h("div",{style:{textAlign:"center",color:C.muted,fontSize:12,padding:"10px 0"}},"Generating prediction..."),
        !loading[key]&&!p&&h("button",{onClick:function(){getPred(m);},style:{width:"100%",padding:"8px",background:C.gold+"22",border:"1px solid "+C.gold,borderRadius:8,color:C.gold,fontSize:12,fontWeight:600,cursor:"pointer"}},btnLabel),
        p&&!p.error&&h("div",null,
          h("div",{style:{display:"flex",borderRadius:5,overflow:"hidden",height:7,marginBottom:5,gap:2}},
            h("div",{style:{flex:p.homeWin||0,background:C.blue,borderRadius:"4px 0 0 4px"}}),
            h("div",{style:{flex:p.draw||0,background:C.muted}}),
            h("div",{style:{flex:p.awayWin||0,background:C.red,borderRadius:"0 4px 4px 0"}})
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:12}},
            h("span",{style:{color:C.blue,fontWeight:700}},p.homeWin+"% "+m.team1),
            h("span",{style:{color:C.muted}},p.draw+"% Draw"),
            h("span",{style:{color:C.red,fontWeight:700}},p.awayWin+"% "+m.team2)
          ),
          h("div",{style:{background:"#0a0f1e",borderRadius:8,padding:"7px 12px",textAlign:"center",marginBottom:10}},
            h("div",{style:{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}},tx.predictedScore||"Predicted Score"),
            h("div",{style:{fontSize:16,fontWeight:800,color:C.goldL}},m.team1+" "+p.score+" "+m.team2)
          ),
          h("p",{style:{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:8}},p.analysis),
          h("div",{style:{fontSize:11,color:C.muted}},
            (tx.confidence||"Confidence"),
            h("span",{style:{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:700,background:cBg(p.confidence),color:cColor(p.confidence),marginLeft:6}},p.confidence)
          )
        ),
        p&&p.error&&h("div",{style:{fontSize:12,color:C.muted,textAlign:"center",padding:"8px 0"}},"Prediction not available.")
      );
    })
  );
}
